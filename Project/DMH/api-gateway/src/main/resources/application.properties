spring.application.name=api-gateway
server.port=8083
#spring.config.import=optional:configserver:instead
#spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=false
spring.main.web-application-type=reactive
spring.config.import=optional:configserver:instead
#Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
spring.cloud.loadbalancer.enabled=true
#Debug
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true
logging.level.org.springframework.cloud.gateway=TRACE
#logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
# Api User Connection to Gateway
spring.cloud.gateway.server.webflux.routes[0].id=api-user
spring.cloud.gateway.server.webflux.routes[0].uri=lb://API-USER
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/user/**
